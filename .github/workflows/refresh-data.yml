name: Refresh market data

on:
  schedule:
    # Market-hours refresh: every 30 minutes, 6:30am-1:00pm Pacific (13:30-20:00
    # UTC during PDT/summer; shifts to 5:30am-12:00pm Pacific in winter/PST,
    # same as the existing close-run below).
    - cron: "30 13 * * 1-5"        # 6:30am PT - market open
    - cron: "0,30 14-19 * * 1-5"   # 7:00am - 12:30pm PT, every 30 min
    - cron: "0 20 * * 1-5"         # 1:00pm PT - market close
    # 22:15 UTC = 5:15pm ET during daylight saving (6:15pm ET in winter).
    # Final end-of-day snapshot run, after the close data has settled.
    - cron: "15 22 * * 1-5"
  workflow_dispatch: {} # lets you trigger a refresh manually from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest market data
        run: node fetch-data.mjs

      - name: Commit updated data.json
        run: |
          git config user.name "market-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Market data $(date -u +%F\ %H:%M) UTC"
          git push

