/* ================================================================ *
 *  DATA LAYER — Stooq free EOD history (no key), CORS-proxied.
 *  Cached per calendar day in localStorage so the app loads
 *  instantly after the first fetch of the day.
 * ================================================================ */
const PROXIES = [
  u => "https://api.allorigins.win/raw?url=" + encodeURIComponent(u),
  u => "https://corsproxy.io/?url=" + encodeURIComponent(u)
];
const STOOQ_HISTORY = t => "https://stooq.com/q/d/l/?s=" + t.toLowerCase() + ".us&i=d";
const CACHE_KEY = "fundledger.v2";
const todayKey = () => new Date().toISOString().slice(0,10);

function loadCache(){
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if(!raw) return null;
    const c = JSON.parse(raw);
    return c.day === todayKey() ? c : null;
  } catch { return null; }
}
function saveCache(data){
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({ day: todayKey(), ...data })); } catch {}
}

/* ---- Tier 0: pre-built data.json committed by the scheduled job ----
 * Same-origin, so it loads instantly with no proxies and no waiting. */
async function loadStatic(){
  const res = await fetch("./data.json?v=" + todayKey(), { cache: "no-cache", signal: AbortSignal.timeout(6000) });
  if (!res.ok) throw new Error("no data.json");
  const j = await res.json();
  if (!j || !j.returns || Object.keys(j.returns).length < 10) throw new Error("bad data.json");
  return j;
}

async function fetchWithProxies(url){
  let lastErr;
  for (const wrap of PROXIES){
    try {
      const res = await fetch(wrap(url), { signal: AbortSignal.timeout(15000) });
      if(!res.ok) throw new Error("HTTP "+res.status);
      const text = await res.text();
      if (text && text.length > 40) return text;
      throw new Error("empty body");
    } catch(e){ lastErr = e; }
  }
  throw lastErr || new Error("all proxies failed");
}

/* ---- 100%+ Club: free full-market screen via stockanalysis.com ----
 * Free and keyless; covers all US-listed stocks (NYSE, Nasdaq, ADRs) with
 * end-of-day data. Endpoint is undocumented, so parsing is defensive and
 * the app falls back to the labeled snapshot if the shape ever changes. */
const CLUB_URL = "https://stockanalysis.com/_api/endpoints/screener/data-points?type=s&ids=chYTD+price";

function parseClub(jsonText){
  const j = JSON.parse(jsonText);
  const map = (j && j.data && j.data.data) || {};
  const out = Object.entries(map)
    .map(([t,v]) => ({ t:String(t).toUpperCase(), n:"", price:Number(v.price), ytd:Number(v.chYTD) }))
    .filter(r => isFinite(r.price) && isFinite(r.ytd) && r.price >= 1 && r.ytd > 100)
    .sort((a,b)=>b.ytd-a.ytd)
    .slice(0,50)
    .map(r => ({ ...r, ytd:+r.ytd.toFixed(2) }));
  return out;
}

async function fetchClub(){
  const text = await fetchWithProxies(CLUB_URL);
  const rows = parseClub(text);

  return rows;

/* ---- Fallback source: Anthropic API with web search ----
 * Used when direct feeds are unreachable (e.g. previewing inside Claude,
 * where outside requests are blocked). Returns real, current figures via
 * web search rather than a price feed — clearly labeled in the UI. */
async function askClaudeJSON(prompt){
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      model:"claude-sonnet-4-6",
      max_tokens:1000,
      messages:[{ role:"user", content:prompt }],
      tools:[{ type:"web_search_20250305", name:"web_search" }]
    })
  });
  const data = await res.json();
  const text = (data.content||[]).map(b=>b.text||"").join("\n").replace(/```json|```/g,"").trim();
  const m = text.match(/[\[{][\s\S]*[\]}]/);
  return JSON.parse(m ? m[0] : text);
}

const PERIOD_WORDS = {"1M":"1-month","2M":"2-month","3M":"3-month","YTD":"year-to-date","1Y":"1-year"};

async function claudeFetchReturns(period){
  const parsed = await askClaudeJSON(
    "Use web search to find the "+PERIOD_WORDS[period]+" price return (percent) as of the latest market close for each of these US-listed ETFs: "
    + UNIQUE_TICKERS.join(", ")
    + '. Reply with ONLY a raw JSON object mapping ticker to number, e.g. {"EWJ":2.3,"XLK":-1.2}. No prose, no markdown fences. Omit a ticker only if nothing is found.'
  );
  const clean = {};
  if (parsed && typeof parsed === "object" && !Array.isArray(parsed)){
    for (const [k,v] of Object.entries(parsed)) if (typeof v === "number" && isFinite(v)) clean[k.toUpperCase()] = v;
  }
  if (!Object.keys(clean).length) throw new Error("empty");
  return clean;
}

}

// Parse Stooq daily CSV -> [{d:Date, c:close}], oldest → newest.
function parseHistory(csv){
  const lines = csv.trim().split("\n");
  const out = [];
  for (let i=1;i<lines.length;i++){
    const p = lines[i].split(",");
    const close = parseFloat(p[4]);
    if (p[0] && isFinite(close)) out.push({ d:p[0], c:close });
  }
  return out;
}

// Compute period returns from a daily close series.
function computeReturns(hist){
  if (!hist || hist.length < 2) return null;
  const last = hist[hist.length-1];
  const lastDate = new Date(last.d+"T00:00:00");
  const closeOnOrBefore = target => {
    for (let i=hist.length-1;i>=0;i--) if (new Date(hist[i].d+"T00:00:00") <= target) return hist[i].c;
    return hist[0].c;
  };
  const minus = (months)=>{ const d=new Date(lastDate); d.setMonth(d.getMonth()-months); return d; };
  const jan1 = new Date(lastDate.getFullYear(),0,1);
  const yearAgo = new Date(lastDate); yearAgo.setFullYear(yearAgo.getFullYear()-1);
  const pct = base => base>0 ? +(((last.c/base)-1)*100).toFixed(2) : null;
  return {
    asOf: last.d,
    price: last.c,
    "1M": pct(closeOnOrBefore(minus(1))),
    "2M": pct(closeOnOrBefore(minus(2))),
    "3M": pct(closeOnOrBefore(minus(3))),
    "YTD": pct(closeOnOrBefore(jan1)),
    "1Y": pct(closeOnOrBefore(yearAgo))
  };
}

// Fetch all tickers with limited concurrency; report progress.
async function fetchAllReturns(onProgress){
  const results = {};
  let done = 0, failed = 0;
  const queue = [...UNIQUE_TICKERS];
  const workers = Array.from({length:6}, async ()=>{
    while(queue.length){
      const t = queue.shift();
      try {
        const csv = await fetchWithProxies(STOOQ_HISTORY(t));
        const r = computeReturns(parseHistory(csv));
        if (r) results[t] = r; else failed++;
      } catch { failed++; }
      done++; onProgress(done, UNIQUE_TICKERS.length);
    }
  });
  await Promise.all(workers);
  return { results, failed };
}

  source: null,        // 'stooq' | 'search' | null
  starGainers: null,   // [{t, price, ytd, stars}] from data.json
  allGreen: null,      // [{t, price, w, m1, m3, m6, ytd, y1}] from data.json
  allRed: null,        // [{t, price, w, m1, m3, m6, ytd, y1}] from data.json
  oneMonthGainers: null, // [{t, price, w, m1, m3, m6, ytd, y1}] from data.json
  multiListed: null,   // [{t, price, w, m1, m3, m6, ytd, y1, count, inLists}] from data.json
  searchReturns: {}    // period -> { TICKER: pct } when source === 'search'
};
const activePeriod = () => state.timeframe || "1D";
const returnFor = t => {
  if (state.source === "search"){
    const map = state.searchReturns[activePeriod()];
    return map && map[t] != null ? map[t] : null;
  }
  const r = state.returns[t];
  return r && r[activePeriod()] != null ? r[activePeriod()] : null;
};
const priceFor = t => {
  if (state.source === "search") return null;
  const r = state.returns[t];
  return r && r.price != null ? r.price : null;
};
const dayFor = t => {
  if (state.source === "search") return null;
  const r = state.returns[t];
  return r && r["1D"] != null ? r["1D"] : null;
};
// "YYYY-MM-DD" -> "MM/DD/YY"
function fmtDate(d){
  if (!d) return null;
  const m = String(d).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return null;
  return m[2] + "/" + m[3] + "/" + m[1].slice(2);
}

/* ================================================================ *
 *  RENDER
 * ================================================================ */
const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function fmtRet(v){
  if (v == null) return '<span class="ret" style="color:var(--ink-faint)">—</span>';
  const cls = v >= 0 ? "pos" : "neg";
  return '<span class="ret '+cls+'">'+(v>=0?"+":"")+v.toFixed(2)+'%</span>';
}
// Table cell for a percentage value, colored green/red by sign.
function pctTd(v, decimals){
  if (v == null) return '<td>\u2014</td>';
  const cls = v >= 0 ? "pos" : "neg";
  return '<td class="'+cls+'">'+(v>=0?"+":"")+v.toFixed(decimals)+'%</td>';
}

function rowHTML({rank,t,n,price,day,ret,showRet,active,action}){
  const secondary = day!=null
    ? '<span class="price '+(day>=0?'pos':'neg')+'">'+(day>=0?'+':'')+day.toFixed(2)+'%</span>'
    : (price!=null ? '<span class="price">$'+price.toFixed(2)+'</span>' : '');
  return '<button class="row'+(active?' active':'')+'" data-action="'+action+'" data-t="'+esc(t)+'">'
    + '<span class="row-left">'
    + (rank!=null ? '<span class="rank">'+rank+'</span>' : '')
    + '<span class="marker"></span>'
    + '<span class="tick">'+esc(t)+'</span>'
    + '<span class="name">'+esc(n)+'</span>'
    + secondary
    + '</span>'
    + (showRet ? fmtRet(ret) : '')
    + '</button>';
}

function sectionHTML(key, index, title, count, bodyHTML){
  const open = state.expanded[key];
  return '<div class="section">'
    + '<button class="section-head" data-section="'+key+'" aria-expanded="'+open+'">'
    + '<span class="section-left"><span class="section-index">'+index+'</span>'
    + '<span class="section-title">'+title+'</span>'
    + (count>0 ? '<span class="badge">'+count+'</span>' : '')
    + '</span><span class="chev">'+(open?'▲':'▼')+'</span></button>'
    + '<div class="section-body"'+(open?'':' hidden')+'>'+bodyHTML+'</div></div>';
}

function pillsHTML(items, selectedLabel, action){
  return '<div class="pills">' + items.map(l =>
    '<button class="pill'+(l===selectedLabel?' selected':'')+'" data-action="'+action+'" data-v="'+esc(l)+'">'+esc(l)+'</button>'
  ).join('') + '</div>';
}

function render(){
  // Freshness banner
  const f = $("#freshness");
  if (state.loading && state.loadProgress){
    f.textContent = "Fetching latest prices… " + state.loadProgress;
    f.classList.remove("warn");
  } else if (state.loading){
    f.textContent = "Fetching latest prices…";
    f.classList.remove("warn");
  } else if (state.source){
    const when = state.fetchedAt ? state.fetchedAt.toLocaleString([], {dateStyle:"medium", timeStyle:"short"}) : "";
    f.textContent = state.source === "static"
      ? "Market close data through " + state.dataAsOf + " · auto-refreshed after each close (last run " + when + ")"
      : state.source === "stooq"
      ? "Market data through " + state.dataAsOf + " (latest free close) · fetched " + when
        + (state.partial ? " · " + state.partial + " tickers unavailable" : "")
      : "Latest close via web search · fetched " + when + " · direct feed blocked in this preview";
    f.classList.toggle("warn", state.source === "stooq" && state.partial > 0);
  } else {
    f.textContent = "Couldn't reach the data source — pull to retry with the refresh button.";
    f.classList.add("warn");
  }
  $("#refreshBtn").classList.toggle("loading", state.loading);

  // Chips
  const chips = [
    ...[...state.selected.country].map(t=>({t,g:"country"})),
    ...[...state.selected.sector].map(t=>({t,g:"sector"})),
    ...[...state.selected.foundation].map(t=>({t,g:"foundation"})),
    ...[...state.selected.club100].map(t=>({t,g:"club100"})),
    ...[...state.selected.stars].map(t=>({t,g:"stars"})),
    ...(state.timeframe ? [{t:state.timeframe,g:"timeframe"}] : [])
  ];
  $("#chips").innerHTML = chips.length
    ? chips.map(c=>'<button class="chip" data-action="chip" data-g="'+c.g+'" data-t="'+esc(c.t)+'">'+esc(c.t)+' ✕</button>').join('')
    : '<span class="chips-empty">No filters selected yet</span>';

  /* --- sections --- */
  const period = activePeriod();

  const tfBody = pillsHTML(TIMEFRAMES, state.timeframe, "timeframe");

  const ranked = ALL_TICKERS.map(r=>({...r,ret:returnFor(r.t)}))
    .sort((a,b)=>(b.ret??-1e9)-(a.ret??-1e9));
  const allBody =
    tfBody
    + '<div class="note">Country, sector, and foundation ETFs ranked by '+(state.timeframe?period+' return':"today's % change (1D)")+'. Tap a period above to switch to a longer window.</div>'
    + ranked.map((r,i)=>rowHTML({
        rank:i+1,t:r.t,n:r.n,day:dayFor(r.t),ret:r.ret,showRet:true,
        active:state.selected[r.origin].has(r.t),action:r.origin
      })).join('');

  const clubRows = state.club ?? CLUB_FALLBACK;
  const clubFresh = state.club
    ? '<div class="group-label">'
      + (state.clubSource === "screen"
          ? 'FULL-MARKET SCREEN · ALL US-LISTED STOCKS · ' + esc(fmtDate(state.dataAsOf) || "latest close")
            + (state.source === "static" ? ' · AUTO-REFRESHED AT CLOSE' : '')
          : 'VIA WEB SEARCH · ALL US-TRADABLE STOCKS · LATEST CLOSE')
      + (state.clubFetchedAt ? ' · FETCHED ' + esc(state.clubFetchedAt.toLocaleString([], {dateStyle:"short", timeStyle:"short"})) : '')
      + '</div>'
    : '<div class="group-label" style="color:var(--rust)">SNAPSHOT · S&amp;P 500 · MID-JULY 2026 · LIVE SOURCES UNREACHABLE</div>';
  const clubBody =
    clubFresh
    + '<div class="note">US-tradable stocks (NYSE, Nasdaq, ADRs) up 100%+ year-to-date, price ≥ $1, highest first.'
    + (state.club ? ' End-of-day figures from a free full-market screen.' :
       ' Tap refresh to retry the live screen.')
    + '</div>'
    + '<div class="gwrap"><table class="gtable"><thead><tr><th>TICKER</th><th>TODAY</th><th>5D</th><th>1M</th><th>3M</th><th>6M</th><th>YTD</th><th>1Y</th></tr></thead><tbody>'
    + clubRows.map(r =>
        '<tr><td>' + esc(r.t) + '</td>'
        + [r.day, r.w, r.m1, r.m3, r.m6, r.ytd, r.y1].map(v => pctTd(v, 1)).join('')
        + '</tr>').join('')
    + '</tbody></table></div>';

  const starRows = state.starGainers || [];
  const starsBody =
    (starRows.length
      ? '<div class="group-label">NEW 1-YEAR HIGHS · DAILY STREAKS · ' + esc(fmtDate(state.dataAsOf) || "latest close") + '</div>'
      : '<div class="group-label" style="color:var(--rust)">AWAITING FIRST MARKET-CLOSE RUN</div>')
    + '<div class="note">Stocks setting new 52-week highs (WSJ new-highs style). Every day a stock makes a new high adds a star, up to ★★★★★ \u2014 stars are cumulative and never reset, even after a missed day. Date shown is when the star was last added.</div>'
    + '<div class="gwrap"><table class="gtable"><thead><tr><th>TICKER</th><th>STARS</th><th>TODAY</th><th>5D</th><th>1M</th><th>3M</th><th>6M</th><th>YTD</th><th>1Y</th></tr></thead><tbody>'
    + starRows.map(r =>
        '<tr><td>' + esc(r.t) + '</td>'
        + '<td>' + "\u2605".repeat(Math.min(r.stars||1,5)) + (r.since?' \u00b7 '+fmtDate(r.since):'') + '</td>'
        + [r.day, r.w, r.m1, r.m3, r.m6, r.ytd, r.y1].map(v => pctTd(v, 1)).join('')
        + '</tr>').join('')
    + '</tbody></table></div>';

  const greenRows = state.allGreen || [];
  const greenBody =
    (greenRows.length
      ? '<div class="group-label">POSITIVE ACROSS EVERY WINDOW \u00b7 ' + esc(fmtDate(state.dataAsOf) || "latest close") + '</div>'
      : '<div class="group-label" style="color:var(--rust)">AWAITING FIRST MARKET-CLOSE RUN</div>')
    + '<div class="note">Stocks green in all six windows \u2014 5-day, 1-month, 3-month, 6-month, YTD, and 1-year \u2014 price \u2265 $1. Top 50 by 1-year return.</div>'
    + (greenRows.length
      ? '<div class="gwrap"><table class="gtable"><thead><tr><th>TICKER</th><th>TODAY</th><th>5D</th><th>1M</th><th>3M</th><th>6M</th><th>YTD</th><th>1Y</th></tr></thead><tbody>'
        + greenRows.map(r =>
            '<tr><td>' + esc(r.t) + '</td>'
            + [r.day, r.w, r.m1, r.m3, r.m6, r.ytd, r.y1].map(v => pctTd(v, 1)).join('')
            + '</tr>').join('')
        + '</tbody></table></div>'
      : '');

  const redRows = state.allRed || [];
  const redBody =
    (redRows.length
      ? '<div class="group-label">NEGATIVE ACROSS EVERY WINDOW \u00b7 ' + esc(fmtDate(state.dataAsOf) || "latest close") + '</div>'
      : '<div class="group-label" style="color:var(--rust)">AWAITING FIRST MARKET-CLOSE RUN</div>')
    + '<div class="note">Stocks red in all six windows \u2014 5-day, 1-month, 3-month, 6-month, YTD, and 1-year \u2014 price \u2265 $1. Worst YTD first.</div>'
    + (redRows.length
      ? '<div class="gwrap"><table class="gtable"><thead><tr><th>TICKER</th><th>TODAY</th><th>5D</th><th>1M</th><th>3M</th><th>6M</th><th>YTD</th><th>1Y</th></tr></thead><tbody>'
        + redRows.map(r =>
            '<tr><td>' + esc(r.t) + '</td>'
            + [r.day, r.w, r.m1, r.m3, r.m6, r.ytd, r.y1].map(v => pctTd(v, 1)).join('')
            + '</tr>').join('')
        + '</tbody></table></div>'
      : '');

  const month1Rows = state.oneMonthGainers || [];
  const month1Body =
    (month1Rows.length
      ? '<div class="group-label">1-MONTH RETURN &gt; 10% \u00b7 ' + esc(fmtDate(state.dataAsOf) || "latest close") + '</div>'
      : '<div class="group-label" style="color:var(--rust)">AWAITING FIRST MARKET-CLOSE RUN</div>')
    + '<div class="note">Top 50 stocks by 1-month gain, price \u2265 $1.</div>'
    + (month1Rows.length
      ? '<div class="gwrap"><table class="gtable"><thead><tr><th>TICKER</th><th>TODAY</th><th>5D</th><th>1M</th><th>3M</th><th>6M</th><th>YTD</th><th>1Y</th></tr></thead><tbody>'
        + month1Rows.map(r =>
            '<tr><td>' + esc(r.t) + '</td>'
            + [r.day, r.w, r.m1, r.m3, r.m6, r.ytd, r.y1].map(v => pctTd(v, 1)).join('')
            + '</tr>').join('')
        + '</tbody></table></div>'
      : '');

  const multiRows = state.multiListed || [];
  const multiBody =
    (multiRows.length
      ? '<div class="group-label">APPEARS IN 2+ BULLISH LISTS \u00b7 ' + esc(fmtDate(state.dataAsOf) || "latest close") + '</div>'
      : '<div class="group-label" style="color:var(--rust)">AWAITING FIRST MARKET-CLOSE RUN</div>')
    + '<div class="note">Stocks showing up in 2 or more of: The 100%+ Club, Star Gainers, All Green, and 1 Month Gainers. Independent bullish signals lining up on the same ticker \u2014 sorted by how many lists it\u2019s in, then YTD.</div>'
    + (multiRows.length
      ? '<div class="gwrap"><table class="gtable"><thead><tr><th>TICKER</th><th>IN</th><th>TODAY</th><th>5D</th><th>1M</th><th>3M</th><th>6M</th><th>YTD</th><th>1Y</th></tr></thead><tbody>'
        + multiRows.map(r =>
            '<tr><td>' + esc(r.t) + '</td>'
            + '<td>' + esc(r.inLists || '') + '</td>'
            + [r.day, r.w, r.m1, r.m3, r.m6, r.ytd, r.y1].map(v => pctTd(v, 1)).join('')
            + '</tr>').join('')
        + '</tbody></table></div>'
      : '');

  $("#main").innerHTML =
      sectionHTML("all","01","Base ETFs, Country, Sectors", 0, allBody)
    + sectionHTML("club100","02","The 100%+ Club YTD", state.selected.club100.size, clubBody)
    + sectionHTML("stars","03","Star Gainers", state.selected.stars.size, starsBody)
    + sectionHTML("green","04","All Green All Year", 0, greenBody)
    + sectionHTML("red","05","Shorts - All Red All Year", 0, redBody)
    + sectionHTML("month1","06","1 Month Gainers", 0, month1Body)
    + sectionHTML("multi","07","Tickers Listed Above Multiple Times", 0, multiBody)
    + '<div class="spacer"></div>';
}

/* ================================================================ *
 *  EVENTS (delegated)
 * ================================================================ */
document.addEventListener("click", e => {
  const el = e.target.closest("[data-section],[data-action]");
  if (!el) return;

  if (el.dataset.section){
    state.expanded[el.dataset.section] = !state.expanded[el.dataset.section];
    render(); return;
  }
  const a = el.dataset.action;
  if (a === "timeframe"){
    state.timeframe = state.timeframe === el.dataset.v ? null : el.dataset.v;
    ensurePeriod();
  } else if (a === "family"){
    state.family = state.family === el.dataset.v ? null : el.dataset.v;
    state.selected.foundation = new Set();
  } else if (a === "chip"){
    const g = el.dataset.g;
    if (g === "timeframe") state.timeframe = null;
    else { state.selected[g].delete(el.dataset.t); }
  } else if (state.selected[a]){
    const set = state.selected[a];
    set.has(el.dataset.t) ? set.delete(el.dataset.t) : set.add(el.dataset.t);
  }
  render();
});

$("#refreshBtn").addEventListener("click", () => loadData(true));

/* ================================================================ *
 *  BOOT
 * ================================================================ */
async function ensurePeriod(){
  // Stooq history already contains every period; only the search source
  // fetches per-period, so pull any missing one on demand.
  if (state.source !== "search") return;
  const p = activePeriod();
  if (state.searchReturns[p]) return;
  state.loading = true; render();
  try {
    state.searchReturns[p] = await claudeFetchReturns(p);
    state.fetchedAt = new Date();
  } catch {}
  state.loading = false; render();
}

async function loadData(force){
  /* Tier 0: pre-built market-close file — instant, no waiting. */
  if (!force){
    try {
      const j = await loadStatic();
      Object.assign(state, {
        returns: j.returns, dataAsOf: j.dataAsOf, partial: j.partial || 0,
        source: "static",
        fetchedAt: j.generatedAt ? new Date(j.generatedAt) : null,
        club: j.club || null,
        starGainers: j.starGainers || null,
        allGreen: j.allGreen || null,
        allRed: j.allRed || null,
        oneMonthGainers: j.oneMonthGainers || null,
        multiListed: j.multiListed || null,
        clubSource: j.club ? (j.clubSource || "screen") : null,
        clubFetchedAt: j.generatedAt ? new Date(j.generatedAt) : null,
        loading: false
      });
      render();
      return;
    } catch {}
  }

  /* Tier 1: today's on-device cache. */
  const cached = force ? null : loadCache();
  if (cached && cached.source){
    Object.assign(state, {
      returns: cached.returns || {}, searchReturns: cached.searchReturns || {},
      dataAsOf: cached.dataAsOf, source: cached.source,
      fetchedAt: cached.fetchedAt ? new Date(cached.fetchedAt) : null,
      partial: cached.partial || 0,
      club: cached.club || null, clubSource: cached.clubSource || null,
      clubFetchedAt: cached.clubFetchedAt ? new Date(cached.clubFetchedAt) : null,
      loading: false
    });
    render();
    return;
  }
  state.loading = true; state.loadProgress = "";
  render();

  /* --- Primary: direct EOD feeds (probe once so blocked environments
         fail over to search in seconds instead of minutes) --- */
  let stooqOk = false;
  let probeOk = false;
  try {
    const probe = await fetchWithProxies(STOOQ_HISTORY("SPY"));
    probeOk = parseHistory(probe).length > 0;
  } catch {}
  if (probeOk) try {
    const { results, failed } = await fetchAllReturns((d,total)=>{
      state.loadProgress = d + " / " + total + " tickers";
      $("#freshness").textContent = "Fetching latest prices… " + state.loadProgress;
    });
    if (Object.keys(results).length >= 10){
      state.returns = results;
      state.partial = failed;
      const dates = Object.values(results).map(r=>r.asOf).sort();
      state.dataAsOf = dates[dates.length-1] || null;
      state.source = "stooq";
      stooqOk = true;
    }
  } catch {}

  if (probeOk) try {
    const rows = await fetchClub();
    state.club = rows; state.clubSource = "screen"; state.clubFetchedAt = new Date();
  } catch { state.club = null; state.clubSource = null; }

  /* --- Fallback: web search via the Anthropic API (works in preview) --- */
  if (!stooqOk){
    $("#freshness").textContent = "Direct feed blocked — fetching latest close via web search…";
    try {
      state.searchReturns[activePeriod()] = await claudeFetchReturns(activePeriod());
      state.source = "search";
    } catch { state.source = null; }
  }
  if (!state.club){
    try {
      state.club = await claudeFetchClub();
      state.clubSource = "search"; state.clubFetchedAt = new Date();
    } catch {}
  }

  if (state.source || state.club) state.fetchedAt = new Date();
  saveCache({
    source: state.source, returns: state.returns, searchReturns: state.searchReturns,
    dataAsOf: state.dataAsOf,
    fetchedAt: state.fetchedAt ? state.fetchedAt.toISOString() : null,
    partial: state.partial,
    club: state.club, clubSource: state.clubSource,
    clubFetchedAt: state.clubFetchedAt ? state.clubFetchedAt.toISOString() : null
  });
  state.loading = false;
  state.loadProgress = "";
  render();
}

render();
loadData(false);
</script>
</body>
</html>
